# ============================================
# Local Host Mode (default)
# Spring Boot runs on host (e.g. IntelliJ).
# Infra and ai-service may run in Docker and are exposed to localhost.
# ============================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fingenie}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fingenie}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finpassword}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
